<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python Challenge — Live Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Saira+Condensed:wght@600;700;800;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0707;--bg-2:#0f0a0a;--panel:#140d0d;--panel-2:#1a1010;
  --hair:#3a1a20;--hair-2:#5a2430;
  --amber:#ff2e54;--amber-2:#cc1838;--amber-dim:#8a2030;
  --green:#2bd46f;--cyan:#00f0ff;--red:#ff2e54;
  --gold:#ffcf40;--gold-hi:#fff3c4;--gold-lo:#b8860b;
  --silver:#dfe6ef;--silver-hi:#ffffff;--silver-lo:#8a96a6;
  --bronze:#cd7f32;--bronze-hi:#f0a868;--bronze-lo:#7a4a1a;
  --text:#e8dce0;--dim:#8a7580;--bright:#fff0f4;
  --glow:0 0 12px;
  --font-display:'Saira Condensed','Oswald','Arial Narrow',system-ui,sans-serif;--font-hud:'Rajdhani','Segoe UI',system-ui,sans-serif;--font-mono:'JetBrains Mono','SF Mono','Consolas',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'JetBrains Mono',monospace;color:var(--text);background:var(--bg);min-height:100vh;overflow-x:hidden;
  background-image:
    radial-gradient(1100px 600px at 80% -10%, rgba(255,46,84,.12), transparent 60%),
    radial-gradient(900px 600px at 10% 110%, rgba(0,240,255,.06), transparent 60%),
    repeating-linear-gradient(0deg, rgba(255,46,84,.02) 0px, rgba(255,46,84,.02) 1px, transparent 1px, transparent 3px);
  -webkit-font-smoothing:antialiased}
.scanline{position:fixed;inset:0;pointer-events:none;z-index:999;background:linear-gradient(rgba(255,46,84,.025),transparent 3px);background-size:100% 4px;opacity:.4}
.wrap{max-width:1500px;margin:0 auto;padding:26px 36px 50px;position:relative;z-index:1}

/* header */
.lb-head{display:flex;align-items:center;gap:20px;margin-bottom:6px}
.lb-logo{width:58px;height:58px;flex-shrink:0;filter:drop-shadow(0 0 8px rgba(255,214,10,.5))}
.lb-logo svg{width:100%;height:100%}
.lb-titles h1{font-weight:800;font-size:2.3rem;letter-spacing:.06em;color:var(--bright);line-height:1;text-shadow:var(--glow) rgba(255,214,10,.4)}
.lb-titles h1 .y{color:var(--amber)}
.lb-titles .sub{font-family:var(--font-hud);font-weight:600;font-size:.92rem;color:var(--cyan);letter-spacing:.18em;margin-top:8px;opacity:.8}
.lb-status{margin-left:auto;text-align:right}
.phase-badge{display:inline-flex;align-items:center;gap:10px;font-family:var(--font-hud);font-weight:700;font-size:1.05rem;letter-spacing:.14em;
  color:#0a0a06;background:var(--amber);padding:9px 20px;border-radius:4px;box-shadow:var(--glow) rgba(255,214,10,.6)}
.live-dot{width:9px;height:9px;border-radius:50%;background:#0a0a06;animation:pulse 1.2s infinite}
@keyframes pulse{50%{opacity:.25}}
.updated{font-size:.72rem;color:var(--dim);margin-top:9px;letter-spacing:.06em}
.divider{height:1px;background:linear-gradient(90deg,var(--amber),var(--green),transparent);margin:16px 0 28px;box-shadow:0 0 8px rgba(255,214,10,.4)}

/* podium */
.podium{display:grid;grid-template-columns:1fr 1.18fr 1fr;gap:22px;align-items:end;margin-bottom:34px}
.pod{position:relative;border-radius:8px;padding:26px 22px;text-align:center;border:1px solid var(--hair-2);
  background:linear-gradient(180deg,var(--panel-2),var(--panel));overflow:hidden;transition:.4s}
.pod::before{content:"";position:absolute;top:0;left:0;right:0;height:3px}
.pod::after{content:attr(data-tag);position:absolute;top:8px;right:10px;font-size:.56rem;letter-spacing:.16em;color:var(--amber-dim);opacity:.6}
.pod.p1{transform:translateY(-22px);border-color:rgba(255,207,64,.6);box-shadow:0 24px 70px -28px var(--gold), inset 0 0 50px rgba(255,207,64,.05)}
.pod.p1::before{background:linear-gradient(90deg,var(--gold-lo),var(--gold-hi),var(--gold-lo));box-shadow:0 0 16px var(--gold)}
.pod.p2::before{background:linear-gradient(90deg,var(--silver-lo),var(--silver-hi),var(--silver-lo));box-shadow:0 0 12px var(--silver)}
.pod.p3::before{background:linear-gradient(90deg,var(--bronze-lo),var(--bronze-hi),var(--bronze-lo));box-shadow:0 0 12px var(--bronze)}
.pod .medal{font-weight:800;font-size:.92rem;letter-spacing:.14em;padding:5px 14px;border-radius:3px;display:inline-block;margin-bottom:14px}
.pod.p1 .medal{color:#3a2c00;background:linear-gradient(160deg,var(--gold-hi),var(--gold) 45%,var(--gold-lo));box-shadow:0 0 16px var(--gold),inset 0 1px 1px rgba(255,255,255,.5);font-family:var(--font-hud);font-weight:700;text-shadow:0 1px 0 rgba(255,255,255,.3)}
.pod.p2 .medal{color:#2a3038;background:linear-gradient(160deg,var(--silver-hi),var(--silver) 45%,var(--silver-lo));box-shadow:0 0 12px var(--silver),inset 0 1px 1px rgba(255,255,255,.6);font-family:var(--font-hud);font-weight:700;text-shadow:0 1px 0 rgba(255,255,255,.4)}
.pod.p3 .medal{color:#2a1607;background:linear-gradient(160deg,var(--bronze-hi),var(--bronze) 45%,var(--bronze-lo));box-shadow:0 0 12px var(--bronze),inset 0 1px 1px rgba(255,255,255,.35);font-family:var(--font-hud);font-weight:700;text-shadow:0 1px 0 rgba(255,255,255,.2)}
.pod .rank-num{font-family:var(--font-display);font-weight:800;font-size:3.6rem;line-height:1;margin-bottom:6px;color:var(--bright)}
.pod.p1 .rank-num{font-size:4.4rem;background:linear-gradient(180deg,var(--gold-hi),var(--gold) 50%,var(--gold-lo));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 24px var(--gold)}
.pod.p2 .rank-num{background:linear-gradient(180deg,var(--silver-hi),var(--silver) 50%,var(--silver-lo));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 18px var(--silver)}
.pod.p3 .rank-num{background:linear-gradient(180deg,var(--bronze-hi),var(--bronze) 50%,var(--bronze-lo));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 18px var(--bronze)}
.pod .team{font-family:var(--font-display);font-weight:700;font-size:1.5rem;color:var(--bright);margin-bottom:4px;word-break:break-word;letter-spacing:.01em}
.pod.p1 .team{font-size:1.65rem}
.pod .members{font-size:.8rem;color:var(--dim);margin-bottom:16px;min-height:1.2em}
.pod .total{font-weight:800;font-size:2.1rem;color:var(--amber);line-height:1;text-shadow:var(--glow) rgba(255,214,10,.3)}
.pod.p1 .total{font-size:2.7rem}
.pod .total-l{font-size:.62rem;letter-spacing:.16em;color:var(--dim);text-transform:uppercase;margin-top:4px}
.pod .breakdown{display:flex;justify-content:center;gap:14px;margin-top:16px;padding-top:14px;border-top:1px solid var(--hair)}
.pod .bd{font-size:.7rem;color:var(--dim)}
.pod .bd b{display:block;color:var(--text);font-size:1rem;margin-top:2px}

/* list */
.list-head{display:grid;grid-template-columns:60px 1fr 100px 100px 100px 120px;gap:14px;padding:0 22px 10px;
  font-size:.68rem;letter-spacing:.14em;color:var(--dim);text-transform:uppercase}
.list-head .r{text-align:center}.list-head .n{text-align:right}
.row{display:grid;grid-template-columns:60px 1fr 100px 100px 100px 120px;gap:14px;align-items:center;
  padding:15px 22px;background:var(--panel);border:1px solid var(--hair);border-radius:6px;margin-bottom:9px;transition:.4s;position:relative}
.row::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--amber-dim);opacity:.5}
.row:hover{border-color:var(--hair-2)}
.row.eliminated{opacity:.3;filter:grayscale(.7)}
.row.eliminated::before{background:var(--red)}
.row .rk{font-weight:800;font-size:1.35rem;color:var(--amber);text-align:center;text-shadow:var(--glow) rgba(255,214,10,.25)}
.row .tm{min-width:0}
.row .tm .t{font-family:var(--font-display);font-weight:700;font-size:1.3rem;color:var(--bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.01em}
.row .tm .m{font-size:.78rem;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .ph{font-size:1.02rem;color:var(--text);text-align:right}
.row .ph.dim{color:var(--amber-dim);opacity:.5}
.row .tot{font-family:var(--font-display);font-weight:800;font-size:1.6rem;color:var(--red);text-align:right}
.row .elim-tag{font-size:.6rem;letter-spacing:.1em;color:var(--red);border:1px solid rgba(255,59,59,.4);padding:2px 7px;border-radius:3px;margin-left:8px}

.section-label{font-size:.74rem;letter-spacing:.18em;color:var(--amber-dim);text-transform:uppercase;margin:0 0 14px 4px}
.section-label::before{content:"// ";color:var(--cyan)}
.empty,.loading{text-align:center;padding:90px 20px;color:var(--dim);font-size:1.05rem}
.loading::after{content:"_";animation:blink 1s infinite}
@keyframes blink{50%{opacity:0}}
.fade-in{animation:fadeIn .5s both}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

@media(max-width:900px){
  .podium{grid-template-columns:1fr;gap:14px}.pod.p1{transform:none}
  .list-head,.row{grid-template-columns:44px 1fr 80px}
  .p1c,.p2c,.p3c{display:none}
}
@media(max-width:560px){
  .wrap{padding:18px 14px 40px}
  .lb-head{flex-wrap:wrap;gap:12px}
  .lb-titles h1{font-size:1.9rem}
  .lb-logo{width:44px;height:44px}
  .pod{padding:18px 14px}
  .pod .rank-num,.pod.p1 .rank-num,.pod.p2 .rank-num,.pod.p3 .rank-num{font-size:2.8rem}
  .pod .team,.pod.p1 .team{font-size:1.2rem}
  .pod .total,.pod.p1 .total{font-size:2rem}
  .list-head,.row{grid-template-columns:36px 1fr 64px;gap:8px;padding-left:14px;padding-right:14px}
  .row .tm .t{font-size:1.05rem}
  .lb-status{width:100%;text-align:left}
}
</style>
</head>
<body>
<div class="scanline"></div>
<div class="wrap">
  <div class="lb-head">
    <div class="lb-logo">
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ff2e54"/><stop offset="1" stop-color="#00f0ff"/></linearGradient></defs>
        <rect x="6" y="6" width="52" height="52" rx="6" fill="none" stroke="url(#g)" stroke-width="3"/>
        <circle cx="32" cy="32" r="6" fill="#ff2e54"/>
        <g stroke="#ff2e54" stroke-width="2.4"><line x1="32" y1="6" x2="32" y2="20"/><line x1="32" y1="44" x2="32" y2="58"/><line x1="6" y1="32" x2="20" y2="32"/><line x1="44" y1="32" x2="58" y2="32"/></g>
        <circle cx="32" cy="12" r="2.6" fill="#00f0ff"/><circle cx="32" cy="52" r="2.6" fill="#00f0ff"/><circle cx="12" cy="32" r="2.6" fill="#00f0ff"/><circle cx="52" cy="32" r="2.6" fill="#00f0ff"/>
      </svg>
    </div>
    <div class="lb-titles">
      <h1>[ <span class="y">PYTHON</span> CHALLENGE ]</h1>
      <div class="sub">ACADEMIC FESTIVAL 2026 · DIGITAL TECHNOLOGIES · GIS · root@challenge</div>
    </div>
    <div class="lb-status">
      <span class="phase-badge"><span class="live-dot"></span><span id="phaseLabel">LIVE</span></span>
      <div class="updated" id="updated">connecting…</div>
    </div>
  </div>
  <div class="divider"></div>
  <div id="board"><div class="loading">decrypting leaderboard</div></div>
</div>

<script>
// ====== CONFIG: paste your Apps Script Web App URL here ======
const API_URL = "https://script.google.com/macros/s/AKfycbwT7sC__IOHl7HUAEQGPqED_hrtBrWvZ_PvAcv_noY0fe2ofl5C_MBfjCWO1S3okg5o/exec";
const REFRESH_MS = 5000; // live update every 5 seconds
// =============================================================
const PHASE_LABELS = { phase1:"PHASE 1 · RECON", phase2:"PHASE 2 · DECRYPT", finals:"FINAL · BREACH" };

async function fetchData(){
  if(!API_URL || API_URL.indexOf("PASTE_")===0){ renderDemo(); return; }
  try{ const res=await fetch(API_URL); const data=await res.json(); render(data); }
  catch(err){ document.getElementById('updated').textContent="// connection error — retrying"; }
}
function medalName(r){ return r===1?"GOLD":r===2?"SILVER":r===3?"BRONZE":""; }
function esc(s){ return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function render(data){
  const phase=data.phase||'phase1';
  document.getElementById('phaseLabel').textContent=PHASE_LABELS[phase]||'LIVE';
  document.getElementById('updated').textContent="// sync "+new Date().toLocaleTimeString();
  let teams=(data.teams||[]).slice();
  let visible=teams;
  if(phase==='phase2') visible=teams.filter(t=>t.status!=='eliminated');
  if(phase==='finals') visible=teams.filter(t=>t.status!=='eliminated').slice(0,3);
  const board=document.getElementById('board');
  if(visible.length===0){ board.innerHTML='<div class="empty">// no teams yet — add them in the Scores sheet</div>'; return; }
  const top3=visible.slice(0,3);
  const rest=phase==='finals'?[]:visible.slice(3);
  const podOrder=[top3[1],top3[0],top3[2]], podClass=['p2','p1','p3'], podTag=['NODE_02','NODE_01','NODE_03'];
  let html='<div class="podium fade-in">';
  podOrder.forEach((t,i)=>{
    if(!t){ html+='<div></div>'; return; }
    html+=`<div class="pod ${podClass[i]}" data-tag="${podTag[i]}">
      <span class="medal">${medalName(t.rank)}</span>
      <div class="rank-num">${t.rank}</div>
      <div class="team">${esc(t.team)}</div>
      <div class="members">${esc(t.members||'')}</div>
      <div class="total">${t.total}</div><div class="total-l">total points</div>
      <div class="breakdown"><span class="bd">P1<b>${t.p1}</b></span><span class="bd">P2<b>${t.p2}</b></span><span class="bd">P3<b>${t.p3}</b></span></div>
    </div>`;
  });
  html+='</div>';
  if(rest.length){
    html+='<div class="section-label">standings</div>';
    html+=`<div class="list-head"><span class="r">#</span><span>Team</span><span class="n p1c">P1</span><span class="n p2c">P2</span><span class="n p3c">P3</span><span class="n">Total</span></div>`;
    rest.forEach(t=>{
      const e=t.status==='eliminated';
      html+=`<div class="row ${e?'eliminated':''} fade-in">
        <span class="rk">${t.rank}</span>
        <span class="tm"><div class="t">${esc(t.team)}${e?'<span class="elim-tag">TERMINATED</span>':''}</div><div class="m">${esc(t.members||'')}</div></span>
        <span class="ph p1c ${t.p1?'':'dim'}">${t.p1}</span><span class="ph p2c ${t.p2?'':'dim'}">${t.p2}</span><span class="ph p3c ${t.p3?'':'dim'}">${t.p3}</span>
        <span class="tot">${t.total}</span></div>`;
    });
  }
  board.innerHTML=html;
}
// demo placeholder uses OBVIOUSLY-FAKE codenames, not real names
function renderDemo(){
  render({phase:'phase1',teams:[
    {team:'CIPHER_X',members:'[ team codename ]',p1:12,p2:13,p3:75,total:100,status:'active',rank:1},
    {team:'NULL_BYTE',members:'[ team codename ]',p1:11,p2:14,p3:60,total:85,status:'active',rank:2},
    {team:'OVERFLOW',members:'[ team codename ]',p1:13,p2:11,p3:55,total:79,status:'active',rank:3},
    {team:'SEGFAULT',members:'[ team codename ]',p1:10,p2:12,p3:40,total:62,status:'active',rank:4},
    {team:'KERNEL_PANIC',members:'[ team codename ]',p1:9,p2:10,p3:35,total:54,status:'active',rank:5},
    {team:'DEADLOCK',members:'[ team codename ]',p1:8,p2:7,p3:20,total:35,status:'eliminated',rank:6},
  ]});
  document.getElementById('updated').textContent="// DEMO MODE — paste your Web App URL to go live";
}
fetchData(); setInterval(fetchData, REFRESH_MS);
</script>
</body>
</html>
